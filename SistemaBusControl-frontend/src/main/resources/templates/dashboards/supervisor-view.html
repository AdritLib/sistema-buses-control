<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">

<head>
	<title>Sistema Bus Control - Panel Supervisor</title>
</head>

<body>
	<div id="pagina-contenido">

		<!-- HEADER -->
		<div class="mb-4">
			<h1 class="h3 fw-bold mb-1">Bienvenido Supervisor</h1>
			<p class="text-muted">
				Monitoreo operativo de la flota y control del sistema de transporte.
			</p>
		</div>

		<!-- CARDS -->
		<div class="row mb-5 g-4">

			<div class="col-md-3">
				<a th:href="@{/supervisor/vehiculos-mantenimiento}" class="text-decoration-none">
					<div class="card p-3 border-0 shadow-sm h-100" style="border-radius: 12px;">
						<h6 class="text-secondary mb-1">Mantenimientos</h6>
						<h2 class="fw-bold text-dark" th:text="${totalMantenimientos}">0</h2>
						<i class="bi bi-tools fs-3 text-primary"></i>
					</div>
				</a>
			</div>

			<div class="col-md-3">
				<a th:href="@{/supervisor/vehiculos-seguro}" class="text-decoration-none">
					<div class="card p-3 border-0 shadow-sm h-100" style="border-radius: 12px;">
						<h6 class="text-secondary mb-1">Seguros</h6>
						<h2 class="fw-bold text-dark" th:text="${totalSeguros}">0</h2>
						<i class="bi bi-shield-check fs-3 text-success"></i>
					</div>
				</a>
			</div>

			<div class="col-md-3">
				<a th:href="@{/supervisor/asignaciones}" class="text-decoration-none">
					<div class="card p-3 border-0 shadow-sm h-100" style="border-radius: 12px;">
						<h6 class="text-secondary mb-1">Asignaciones</h6>
						<h2 class="fw-bold text-dark" th:text="${totalAsignaciones}">0</h2>
						<i class="bi bi-diagram-3 fs-3 text-warning"></i>
					</div>
				</a>
			</div>

			<div class="col-md-3">
				<a th:href="@{/supervisor/incidencias}" class="text-decoration-none">
					<div class="card p-3 border-0 shadow-sm h-100" style="border-radius: 12px;">
						<h6 class="text-secondary mb-1">Incidencias</h6>
						<h2 class="fw-bold text-dark" th:text="${totalIncidencias}">0</h2>
						<i class="bi bi-exclamation-triangle fs-3 text-danger"></i>
					</div>
				</a>
			</div>

		</div>

		<!-- PANEL INFO -->
		<div class="card p-4 border-0 shadow-sm" style="border-radius: 12px;">
			<h5 class="fw-bold mb-2">
				<i class="bi bi-sliders me-2 text-primary"></i>
				Panel de Supervisión Operativa
			</h5>

			<p class="text-muted mb-0">
				Desde este panel puedes acceder a la gestión de mantenimiento, seguros, asignaciones e incidencias del
				sistema.
			</p>
		</div>

	</div>
</body>

</html>
