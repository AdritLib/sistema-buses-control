<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">

<head>
	<title>Sistema Bus Control - Formulario Asignacion</title>
</head>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">

<head>
	<title>Asignaciones</title>
</head>

<body>

	<div id="pagina-contenido">

		<div class="mb-4">
			<h1 class="h3 fw-bold" th:text="${modo == 'editar'} ? 'Editar Asignación' : 'Nueva Asignación'"></h1>
			<p class="text-muted">Formulario de asignaciones del sistema.</p>
		</div>

		<div th:if="${error}" class="alert alert-danger">
			<span th:text="${error}"></span>
		</div>

		<div th:if="${success}" class="alert alert-success">
			<span th:text="${success}"></span>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="card-body">

				<form th:action="@{/supervisor/asignaciones/guardar}" th:object="${asignacionForm}" method="post">

					<input type="hidden" name="id" th:value="${asignacionId}" />

					<div class="mb-3">
						<label class="form-label">Conductor</label>
						<select class="form-select" th:field="*{conductorID}" required>
							<option value="">Seleccione conductor</option>
							<option th:each="c : ${conductores}" th:value="${c.id}" th:text="${c.nombre}">
							</option>
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label">Ruta</label>
						<select class="form-select" th:field="*{rutaID}" required>
							<option value="">Seleccione ruta</option>
							<option th:each="r : ${rutas}" th:value="${r.id}" th:text="${r.nombre}">
							</option>
						</select>
					</div>

					<div class="mb-3">
						<label class="form-label">Vehículo</label>
						<select class="form-select" th:field="*{vehiculoID}" required>
							<option value="">Seleccione vehículo</option>
							<option th:each="v : ${vehiculos}" th:value="${v.id}" th:text="${v.placa}">
							</option>
						</select>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label class="form-label">Fecha</label>
							<input type="date" th:field="*{fecha}" class="form-control" required>
						</div>

						<div class="col-md-3 mb-3">
							<label class="form-label">Hora Inicio</label>
							<input type="time" th:field="*{horaInicio}" class="form-control" required>
						</div>

						<div class="col-md-3 mb-3">
							<label class="form-label">Hora Fin</label>
							<input type="time" th:field="*{horaFin}" class="form-control" required>
						</div>
					</div>

					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-primary">
							Guardar
						</button>

						<a th:href="@{/supervisor/asignaciones}" class="btn btn-secondary">
							Cancelar
						</a>
					</div>

				</form>

			</div>
		</div>

	</div>

</body>

</html>

</html>
