<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">

<head>
	<title>Sistema Bus Control - Seguros</title>
</head>

<body>
	<div id="pagina-contenido">
		
		<div class="mb-4">
			<h1 class="h3 fw-bold">Seguros Vehiculares</h1>
			<p class="text-muted">Pólizas registradas en la flota</p>
		</div>

		<a th:href="@{/supervisor/vehiculos-seguro/form}" class="btn btn-primary mb-3">
			Nuevo seguro
		</a>

		<div class="card border-0 shadow-sm">
			<div class="card-body p-0">

				<table class="table table-hover mb-0">
					<thead class="table-light">
						<tr>
							<th>ID</th>
							<th>Número de Póliza</th>
							<th>Vencimiento</th>
							<th class="text-end">Acciones</th>
						</tr>
					</thead>

					<tbody>

						<tr th:if="${#lists.isEmpty(seguros)}">
							<td colspan="4" class="text-center py-4">No hay seguros registrados</td>
						</tr>

						<tr th:each="s : ${seguros}">
							<td th:text="${s.id}"></td>
							<td th:text="${s.numero}"></td>
							<td th:text="${s.fechaVencimiento}"></td>

							<td class="text-end">

								<!-- EDITAR -->
								<a th:href="@{/supervisor/vehiculos-seguro/form/{id}(id=${s.id})}"
									class="btn btn-sm btn-warning fw-semibold">
									Editar
								</a>

							</td>
						</tr>

					</tbody>
				</table>

			</div>
		</div>

	</div>
</body>

</html>
