<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">

<head>
	<title>Sistema Bus Control - Formulario Seguro</title>
</head>

<body>

	<div id="pagina-contenido">

		<div th:if="${error}" class="alert alert-danger">
			<span th:text="${error}"></span>
		</div>

		<div th:if="${success}" class="alert alert-success">
			<span th:text="${success}"></span>
		</div>

		<div class="mb-4">
			<h1 class="h3 fw-bold" th:text="${modo == 'editar'} ? 'Editar Seguro Vehicular' : 'Nuevo Seguro Vehicular'">
			</h1>

			<p class="text-muted" th:text="${modo == 'editar'} ? 'Edita la póliza' : 'Registra una nueva póliza'">
			</p>
		</div>

		<div class="card shadow-sm p-4 col-lg-6">

			<form th:action="@{/supervisor/vehiculos-seguro/guardar}" th:object="${seguroForm}" method="post">

				<input type="hidden" name="id" th:value="${seguroId}" />

				<h3 th:text="${modo == 'editar'} ? 'Editar Seguro' : 'Nuevo Seguro'"></h3>

				<div class="mb-3">
					<label>Número</label>
					<input type="text" th:field="*{numero}" class="form-control">
				</div>

				<div class="mb-3">
					<label>Fecha vencimiento</label>
					<input type="date" th:field="*{fechaVencimiento}" class="form-control">
				</div>

				<button class="btn btn-primary">
					Guardar
				</button>

			</form>
		</div>

	</div>

</body>

</html>
