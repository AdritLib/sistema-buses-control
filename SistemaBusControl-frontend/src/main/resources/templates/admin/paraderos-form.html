<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">
<head>
    <title>Sistema Bus Control - Formulario Paradero</title>
</head>
<body>
    <div id="pagina-contenido">
        <div class="mb-4">
            <a th:href="@{/admin/paraderos}" class="text-decoration-none text-muted mb-2 d-inline-block">
                <i class="bi bi-arrow-left me-1"></i> Volver a la lista
            </a>
            <h1 class="h3 fw-bold mb-1" th:text="${esEdicion != null ? 'Editar Paradero' : 'Registrar Nuevo Paradero'}">Formulario</h1>
        </div>

        <div class="card card-custom border-0 col-lg-8">
            <div class="card-body p-4 p-md-5">
                <form th:action="${esEdicion != null ? '/admin/paraderos/actualizar/' + paraderoId : '/admin/paraderos/guardar'}" 
                      th:object="${paraderoForm}" method="post">
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Nombre del Paradero</label>
                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Dirección / Avenida</label>
                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{direccion}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Referencia (Opcional)</label>
                        <input type="text" class="form-control bg-light" th:field="*{referencia}">
                    </div>

                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Latitud (GPS)</label>
                            <input type="text" class="form-control bg-light" th:field="*{latitud}" 
                                   pattern="-?[0-9]+(\.[0-9]+)?" placeholder="Ej: -12.046374" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary">Longitud (GPS)</label>
                            <input type="text" class="form-control bg-light" th:field="*{longitud}" 
                                   pattern="-?[0-9]+(\.[0-9]+)?" placeholder="Ej: -77.042793" required>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Estado Operativo</label>
                        <select class="form-select form-control-lg bg-light" th:field="*{estado}" required>
                            <option value="ACTIVO">ACTIVO</option>
                            <option value="INACTIVO">INACTIVO</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-end gap-3">
                        <a th:href="@{/admin/paraderos}" class="btn btn-light border fw-semibold px-4 py-2">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold px-5 py-2 shadow-sm">
                            <i class="bi bi-save me-2"></i> <span th:text="${esEdicion != null ? 'Actualizar Cambios' : 'Guardar Paradero'}"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
