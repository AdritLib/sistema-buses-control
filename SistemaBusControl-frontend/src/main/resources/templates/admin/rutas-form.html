<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">
<head>
    <title>Sistema Bus Control - Formulario Ruta</title>
</head>
<body>
    <div id="pagina-contenido">
        <div class="mb-4">
            <a th:href="@{/admin/rutas}" class="text-decoration-none text-muted d-inline-block mb-2"><i class="bi bi-arrow-left me-1"></i> Volver</a>
            <h1 class="h3 fw-bold mb-1" th:text="${esEdicion != null ? 'Editar Ruta' : 'Registrar Ruta'}">Formulario</h1>
        </div>

        <div class="card border-0 shadow-sm rounded-4 col-lg-8">
            <div class="card-body p-4 p-md-5">
                <form th:action="${esEdicion != null ? '/admin/rutas/actualizar/' + rutaId : '/admin/rutas/guardar'}" th:object="${rutaForm}" method="post">
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Nombre de la Ruta</label>
                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{nombre}" placeholder="Ej: Ruta A" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Tipo</label>
						<select class="form-select bg-light" th:field="*{tipo}" required>
                            <option value="IDA">Ida</option>
							<option value="VUELTA">Vuelta</option>
                        </select>
                    </div>
					
					<div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Estado</label>
                        <select class="form-select bg-light" th:field="*{estado}">
                            <option value="INACTIVO">Inactivo</option>
							<option value="ACTIVO">Activo</option>
                        </select>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Estación de Origen</label>
                        <select class="form-select bg-light" th:field="*{estacionOrigenId}">
                            <option value="">-- Sin asignar --</option>
                            <option th:each="e : ${estaciones}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
                    </div>
					
					<div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Estación de Destino</label>
                        <select class="form-select bg-light" th:field="*{estacionDestinoId}">
                            <option value="">-- Sin asignar --</option>
                            <option th:each="e : ${estaciones}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
                    </div>
					
					<div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Paraderos</label>
                        <select id="selector" class="form-select bg-light" onchange="agregarALista()"> 
                            <option value="" disabled selected>Agregar paradero</option>
                            <option th:each="e : ${paraderos}" th:value="${e.id}" th:text="${e.nombre}"></option>
                        </select>
						
						<ol id="listaVisual" class="my-2"></ol>
						<input type="hidden" id="valoresOcultos" th:field="*{paraderosId}" />
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4">
                        <a th:href="@{/admin/rutas}" class="btn btn-light border px-4 py-2 fw-semibold">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm"><i class="bi bi-save me-2"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
		
		<script th:inline="javascript">
			let elementosSeleccionados = /*[[${rutaForm.paraderosId}]] */ [];
			console.log(elementosSeleccionados);
			document.addEventListener("DOMContentLoaded", () => {
			    const inputOculto = document.getElementById("valoresOcultos");
			    if (inputOculto.value) {
			        elementosSeleccionados = inputOculto.value.split(",");
			    }
			});
	
			function agregarALista() {
			    const select = document.getElementById("selector");
			    const idSeleccionado = select.value;
			    const textoSeleccionado = select.options[select.selectedIndex].text;
	
			    if (!idSeleccionado) return;
	
			    if (!elementosSeleccionados.includes(idSeleccionado)) {
			        elementosSeleccionados.push(idSeleccionado);
	
			        const ul = document.getElementById("listaVisual");
			        const li = document.createElement("li");
			        li.textContent = textoSeleccionado;
			        
			        const btnEliminar = document.createElement("button");
			        btnEliminar.textContent = " X";
					btnEliminar.className = "btn btn-sm btn-outline-danger ms-2";
			        btnEliminar.type = "button";
			        btnEliminar.onclick = function() {
			            elementosSeleccionados = elementosSeleccionados.filter(id => id !== idSeleccionado);
			            ul.removeChild(li);
			            actualizarInputOculto();
			        };
	
			        li.appendChild(btnEliminar);
			        ul.appendChild(li);
	
			        actualizarInputOculto();
			    }
			    select.value = "";
			}
	
			function actualizarInputOculto() {
			    document.getElementById("valoresOcultos").value = elementosSeleccionados.join(",");
			}
		</script>
    </div>
</body>
</html>
