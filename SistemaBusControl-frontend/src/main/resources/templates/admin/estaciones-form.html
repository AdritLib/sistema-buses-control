<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">
<head>
    <title>Sistema Bus Control - Formulario Estación</title>
</head>
<body>
    <div id="pagina-contenido">
        <div class="mb-4">
            <a th:href="@{/admin/estaciones}" class="text-decoration-none text-muted d-inline-block mb-2"><i class="bi bi-arrow-left me-1"></i> Volver</a>
            <h1 class="h3 fw-bold mb-1" th:text="${esEdicion != null ? 'Editar Estación' : 'Registrar Estación'}">Formulario</h1>
        </div>

        <div class="card border-0 shadow-sm rounded-4 col-lg-8">
            <div class="card-body p-4 p-md-5">
                <form th:action="${esEdicion != null ? '/admin/estaciones/actualizar/' + estacionId : '/admin/estaciones/guardar'}" th:object="${estacionForm}" method="post">
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Nombre de la Estación</label>
                        <input type="text" class="form-control form-control-lg bg-light" th:field="*{nombre}" placeholder="Ej: Terminal Sur" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Dirección / Ubicación Física</label>
                        <input type="text" class="form-control bg-light" th:field="*{ubicacion}" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label fw-semibold text-secondary">Supervisor Asignado (Opcional)</label>
                        <select class="form-select bg-light" th:field="*{supervisorId}">
                            <option value="">-- Sin asignar --</option>
                            <option th:each="user : ${supervisores}" th:value="${user.id}" th:text="${user.nombre + ' (' + user.rol + ')'}"></option>
                        </select>
                        <div class="form-text text-muted mt-1"><i class="bi bi-info-circle me-1"></i> El personal con rol SUPERVISOR se listará aquí.</div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-4">
                        <a th:href="@{/admin/estaciones}" class="btn btn-light border px-4 py-2 fw-semibold">Cancelar</a>
                        <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm"><i class="bi bi-save me-2"></i> Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
