<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{compartido/layout :: master(~{::#pagina-contenido}, ~{::title})}">
<head>
    <title>Sistema Bus Control - Estaciones</title>
</head>
<body>
    <div id="pagina-contenido">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 fw-bold mb-1">Estaciones</h1>
                <p class="text-muted mb-0">Gestión de bases de control y sus supervisores a cargo.</p>
            </div>
            
            <div class="d-flex gap-2">
                <form th:action="@{/admin/estaciones}" method="get" class="d-flex gap-2">
                    <input type="number" name="idBuscado" class="form-control px-3" placeholder="Buscar ID..." th:value="${param.idBuscado}" style="border-radius: 8px;" required>
                    <button type="submit" class="btn btn-secondary px-3" style="border-radius: 8px;"><i class="bi bi-search"></i></button>
                    <a th:if="${param.idBuscado}" th:href="@{/admin/estaciones}" class="btn btn-outline-danger px-3" style="border-radius: 8px;"><i class="bi bi-x-lg"></i></a>
                </form>
                <a th:href="@{/admin/estaciones/form}" class="btn btn-primary fw-semibold px-4 rounded-pill shadow-sm">
                    <i class="bi bi-building-fill me-2"></i> Nueva Estación
                </a>
            </div>
        </div>

        <div th:if="${param.exito}" class="alert alert-success border-0 mb-4 rounded-3"><i class="bi bi-check-circle-fill me-2"></i> Operación exitosa.</div>
        <div th:if="${error}" class="alert alert-danger border-0 mb-4 rounded-3" th:text="${error}"></div>

        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-0" style="overflow: hidden; border-radius: 16px;">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-secondary">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre de la Estación</th>
                            <th>Ubicación</th>
                            <th>Supervisor</th>
							<th>Estado</th>
                            <th class="text-center pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(estaciones)}">
                            <td colspan="5" class="text-center py-5 text-muted">No se encontraron estaciones registradas.</td>
                        </tr>
                        <tr th:each="e : ${estaciones}">
                            <td class="ps-4 fw-bold text-secondary" th:text="${e.id}">1</td>
                            <td class="fw-bold text-dark"><i class="bi bi-building me-2 text-primary"></i> <span th:text="${e.nombre}">Nombre</span></td>
                            <td th:text="${e.ubicacion}">Ubicación</td>
                            <td>
                                <span class="badge bg-light text-dark border px-3 py-1.5" th:if="${e.supervisorId == null}">Sin Asignar</span>
                                <span th:if="${e.supervisorId != null}" th:text="${e.supervisorNombre}"></span>
                            </td>
							<td>
								<span th:class="${e.estado == 'ACTIVO' ? 'badge text-bg-warning px-3 py-1.5 rounded-pill fw-bold' :
	                                          (e.estado == 'INACTIVO' ? 'badge bg-secondary-subtle text-secondary px-3 py-1.5 rounded-pill fw-bold' :
	                                          'badge bg-success-subtle text-success px-3 py-1.5 rounded-pill fw-bold')}"
								 th:text="${e.estado}"></span>
							</td>
                            <td class="text-center pe-4">
                                <a th:href="@{/admin/estaciones/form(id=${e.id})}" class="btn btn-sm btn-light border text-primary"><i class="bi bi-pencil-square"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

		<div class="d-flex justify-content-between align-items-center mt-4 px-2" th:if="${param.idBuscado == null && error == null}">
		            <p class="text-muted mb-0">Página: <span class="fw-bold text-primary" th:text="${paginaActual + 1}">1</span></p>
		            <div class="btn-group shadow-sm rounded-3">
		                <a th:href="@{/admin/estaciones(pagina=${paginaActual > 0 ? paginaActual - 1 : 0})}" 
		                   class="btn btn-white border px-3 text-primary" 
		                   th:classappend="${paginaActual == 0} ? 'disabled text-muted' : ''">
		                   <i class="bi bi-chevron-left me-1"></i> Anterior
		                </a>
		                
		                <a th:href="@{/admin/estaciones(pagina=${paginaActual + 1})}" 
		                   class="btn btn-white border px-3 text-primary" 
		                   th:classappend="${#lists.isEmpty(estaciones) || estaciones.size() < 10} ? 'disabled text-muted' : ''">
		                   Siguiente <i class="bi bi-chevron-right ms-1"></i>
		                </a>
		            </div>
		        </div>
    </div>
</body>
</html>
